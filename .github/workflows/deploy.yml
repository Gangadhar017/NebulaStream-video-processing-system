name: Deploy AetherFlow to AWS ECS

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    name: Build, Push, and Deploy
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Configure AWS Credentials from GitHub Secrets
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      # 3. Log in to AWS ECR
      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 4. Build, Tag, and Push Backend API to ECR
      - name: Build and Push Backend API
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: video-api
          IMAGE_TAG: latest
        run: |
          aws ecr describe-repositories --repository-names $ECR_REPOSITORY --region eu-north-1 || \
            aws ecr create-repository --repository-name $ECR_REPOSITORY --region eu-north-1
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./backend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # 5. Build, Tag, and Push Worker to ECR
      - name: Build and Push Worker
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: video-worker
          IMAGE_TAG: latest
        run: |
          aws ecr describe-repositories --repository-names $ECR_REPOSITORY --region eu-north-1 || \
            aws ecr create-repository --repository-name $ECR_REPOSITORY --region eu-north-1
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./worker
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # 6. Force ECS Services to Pull New Images (Rolling Update)
      - name: Trigger Rolling ECS Deployments
        run: |
          # Trigger API deployment
          aws ecs update-service \
            --cluster aetherflow-cluster \
            --service video-api-service \
            --force-new-deployment \
            --region eu-north-1
          
          # Trigger Worker deployment
          aws ecs update-service \
            --cluster aetherflow-cluster \
            --service video-worker-service \
            --force-new-deployment \
            --region eu-north-1
